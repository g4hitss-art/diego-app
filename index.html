const SK_PERSONS  = "persons_v1";
const SK_BKDATE   = "backup_date_v1";
const ALL_KEYS    = [SK_TASKS,SK_LABORAL,SK_PERSONAL,SK_BDAYS,SK_HABITS,SK_LOGS,SK_FECHAS,SK_COMPRAS,SK_NOTAS,SK_CONECTAR,SK_CLOGS,SK_PERSONS];

// ─── INITIAL DATA ────────────────────────────────────────────
const DEFAULT_PERSONS = ["Camilo","Paola","Luis Torres","Marcela","David","Patricia","Jhony","Adriana","Claudia","Henry","Grace","Leo","Leonardo","Víctor","Bibiana","Samuel","Fabián"];

  {id:"21",name:"Papi",day:26,month:10},{id:"22",name:"Silvia",day:3,month:11},
  {id:"23",name:"Paola Coy",day:6,month:11},{id:"24",name:"Andrés",day:10,month:11},
  {id:"25",name:"Juaco",day:11,month:11},{id:"26",name:"Diego",day:14,month:11},
  {id:"27",name:"Araly",day:17,month:11},{id:"28",name:"Sonia",day:23,month:11},
  {id:"29",name:"Suegra",day:25,month:11},{id:"30",name:"Hanz",day:27,month:11},
  {id:"31",name:"Mami",day:23,month:12},{id:"32",name:"Andrés Felipe",day:28,month:12},

const INITIAL_HABITS = [

  {id:"h2",name:"Vaso de agua",type:"simple",days:[1,2,3,4,5,6,0]},
  {id:"h3",name:"Avena",type:"simple",days:[1,2,3,4,5,6,0]},
  {id:"h4",name:"Remolacha",type:"simple",days:[1,2,3,4,5,6,0]},
  {id:"h5",name:"Bañarme",type:"simple",days:[1,2,3,4,5,6,0]},
  {id:"h6",name:"Cepillado",type:"timed",days:[1,2,3,4,5,6,0],slots:["Mañana","Tarde","Noche"]},
  {id:"h7",name:"CrossFit 🏋️",type:"simple",days:[1,2,3,4,5,6]},
  {id:"h8",name:"Barba",type:"simple",days:[1,2,3,4,5,6,0]},
];
const INITIAL_FECHAS = [
  {id:"f1",name:"Aniversario con Juliana",type:"anual",day:21,month:7,emoji:"💑"},
  {id:"f2",name:"Pago administración",type:"mensual",day:5,emoji:"🏢"},
  {id:"f3",name:"Devengado HITSS",type:"mensual",day:10,emoji:"💼"},
  {id:"f4",name:"Viaje Japón",type:"unica",date:"2026-10-24",emoji:"🗾"},
];
const INITIAL_CONECTAR = [
  {id:"c1",name:"Llamar hermana 🌍",type:"simple",days:[6]},
  {id:"c2",name:"WhatsApp mamá",type:"simple",days:[0]},

const MONTHS_FULL=["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS_SHORT=["D","L","M","M","J","V","S"];
const DAYS_FULL=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const CATS=[{id:"laboral",label:"Laboral",color:"#1B4FD8",bg:"#EEF4FF",dot:"🔵"},{id:"personal",label:"Personal",color:"#7C3AED",bg:"#F5F3FF",dot:"🟣"},{id:"sin",label:"Sin definir",color:"#64748B",bg:"#F1F5F9",dot:"⚪"}];
const STATUS_CFG={pendiente:{label:"Pendiente",color:"#64748B"},en_proceso:{label:"En proceso",color:"#1B4FD8"},esperando:{label:"Esperando",color:"#EA580C"},listo:{label:"✓ Listo",color:"#16A34A"}};
const STATUS_CYCLE=["pendiente","en_proceso","esperando","listo"];
const TIPO_CONFIG={anual:{label:"Anual",desc:"Misma fecha cada año",icon:"📅",color:"#1B4FD8",bg:"#EEF4FF"},mensual:{label:"Mensual",desc:"Misma fecha cada mes",icon:"🔁",color:"#059669",bg:"#ECFDF5"},unica:{label:"Única",desc:"Solo ocurre una vez",icon:"📌",color:"#DC2626",bg:"#FEF2F2"}};

// ─── HELPERS ─────────────────────────────────────────────────
const dStr=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const getSem=(s)=>{const d=(Date.now()-new Date(s))/86400000;return d<3?"#22C55E":d<7?"#F59E0B":"#EF4444";};
const fmt=(s)=>new Date(s).toLocaleDateString("es-CO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
const daysUntilBday=(day,month)=>{const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());let next=new Date(now.getFullYear(),month-1,day);if(next<today)next.setFullYear(now.getFullYear()+1);return Math.round((next-today)/86400000);};
const isSameDay=(day,month)=>{const n=new Date();return n.getDate()===day&&(n.getMonth()+1)===month;};
const daysUntilFecha=(f)=>{const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());if(f.type==="unica")return Math.round((new Date(f.date)-today)/86400000);if(f.type==="mensual"){let n=new Date(now.getFullYear(),now.getMonth(),f.day);if(n<=today)n=new Date(now.getFullYear(),now.getMonth()+1,f.day);return Math.round((n-today)/86400000);}if(f.type==="anual"){let n=new Date(now.getFullYear(),f.month-1,f.day);if(n<=today)n=new Date(now.getFullYear()+1,f.month-1,f.day);return Math.round((n-today)/86400000);}return 999;};
const formatFechaLabel=(f)=>{if(f.type==="mensual")return`Día ${f.day} de cada mes`;if(f.type==="anual")return`${f.day} de ${MONTHS_FULL[f.month]} cada año`;if(f.type==="unica")return new Date(f.date).toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"});return "";};
const dueSem=(s)=>{if(!s)return null;const today=new Date();today.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);const diff=Math.round((d-today)/86400000);if(diff<0)return{color:"#EF4444",label:"Vencida",bg:"#FEF2F2"};if(diff===0)return{color:"#F59E0B",label:"Hoy",bg:"#FEF3C7"};return{color:"#22C55E",label:`${diff}d`,bg:"#F0FDF4"};};
const fmtDue=(s)=>{if(!s)return"";return new Date(s).toLocaleDateString("es-CO",{day:"numeric",month:"short"});};
const moveArr=(arr,idx,dir)=>{const to=idx+dir;if(to<0||to>=arr.length)return arr;const a=[...arr];[a[idx],a[to]]=[a[to],a[idx]];return a;};
const load=(key,def=[])=>{try{const v=JSON.parse(localStorage.getItem(key));return v&&Array.isArray(v)?v:def;}catch{return def;}};
const save=(key,val)=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}};
const loadObj=(key,def={})=>{try{const v=JSON.parse(localStorage.getItem(key));return v&&typeof v==="object"&&!Array.isArray(v)?v:def;}catch{return def;}};

// ─── PERSONS STORE ───────────────────────────────────────────
const loadPersons=()=>{const saved=load(SK_PERSONS,[]);return saved.length>0?saved:DEFAULT_PERSONS;};
const savePersons=(p)=>save(SK_PERSONS,p);
const addPersonIfNew=(name,persons,setPersons)=>{if(name&&!persons.includes(name)){const updated=[...persons,name];setPersons(updated);savePersons(updated);}};

// ─── BACKUP ──────────────────────────────────────────────────
const doBackup=()=>{const data={ts:new Date().toISOString()};ALL_KEYS.forEach(k=>{data[k]=localStorage.getItem(k);});const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`backup_diego_${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);localStorage.setItem(SK_BKDATE,new Date().toISOString());};
const doRestore=(file,onDone)=>{const r=new FileReader();r.onload=(e)=>{try{const data=JSON.parse(e.target.result);ALL_KEYS.forEach(k=>{if(data[k])localStorage.setItem(k,data[k]);});onDone();}catch{alert("Error al cargar el backup");}};r.readAsText(file);};
const needsBackup=()=>{const l=localStorage.getItem(SK_BKDATE);if(!l)return false;return(Date.now()-new Date(l))/86400000>=2;};
const lastBackupLabel=()=>{const l=localStorage.getItem(SK_BKDATE);if(!l)return"Nunca";const d=(Date.now()-new Date(l))/86400000;if(d<1)return"Hoy";if(d<2)return"Ayer";return`Hace ${Math.floor(d)} días`;};

// ─── SHARED UI ───────────────────────────────────────────────
function MoveBtn({idx,total,onMove}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
      <button onClick={()=>onMove(-1)} disabled={idx===0} style={{background:idx===0?"#F1F5F9":"#EEF4FF",border:"none",borderRadius:6,width:26,height:26,cursor:idx===0?"default":"pointer",color:idx===0?"#CBD5E1":"#1B4FD8",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>↑</button>
      <button onClick={()=>onMove(1)} disabled={idx===total-1} style={{background:idx===total-1?"#F1F5F9":"#EEF4FF",border:"none",borderRadius:6,width:26,height:26,cursor:idx===total-1?"default":"pointer",color:idx===total-1?"#CBD5E1":"#1B4FD8",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>↓</button>
    </div>
  );
}
function HdrBtn({onClick,label}){
  return <button onClick={onClick} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:10,padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>;
}

// ─── TASK CARD ───────────────────────────────────────────────
function TaskCard({item,idx,items,setItems,showPerson,persons,setPersons}){
  const [showP,setShowP]=useState(false);
  const [customP,setCustomP]=useState("");
  const [editing,setEditing]=useState(false);
  const [editTxt,setEditTxt]=useState(item.text);
  const [showDue,setShowDue]=useState(false);
  const sem=getSem(item.createdAt);
  const scfg=STATUS_CFG[item.status]||STATUS_CFG.pendiente;
  const isListo=item.status==="listo";
  const ds2=dueSem(item.dueDate);
  const upd=(patch)=>setItems(p=>p.map(i=>i.id===item.id?{...i,...patch}:i));
  const cycleStatus=()=>{const ci=STATUS_CYCLE.indexOf(item.status||"pendiente");upd({status:STATUS_CYCLE[(ci+1)%STATUS_CYCLE.length]});};
  const setPerson=(p)=>{if(p)addPersonIfNew(p,persons,setPersons);upd({person:p});setShowP(false);setCustomP("");};
  const saveEdit=()=>{if(editTxt.trim())upd({text:editTxt.trim()});setEditing(false);};
  return(
    <div style={{background:isListo?"#F0FDF4":"#fff",borderRadius:14,border:isListo?"1.5px solid #BBF7D0":`1.5px solid ${sem}22`,boxShadow:"0 2px 8px rgba(0,0,0,0.04)",overflow:"hidden",marginBottom:10}}>
      <div style={{display:"flex",alignItems:"flex-start",padding:"12px 14px 8px",gap:8}}>
        <MoveBtn idx={idx} total={items.length} onMove={(d)=>setItems(p=>moveArr(p,idx,d))}/>
        <div style={{width:9,height:9,borderRadius:"50%",background:sem,marginTop:5,flexShrink:0,boxShadow:`0 0 7px ${sem}80`}}/>
        <div style={{flex:1,minWidth:0}}>
          {editing?(
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input value={editTxt} onChange={e=>setEditTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditing(false);}} autoFocus style={{flex:1,border:"1.5px solid #1B4FD8",borderRadius:8,padding:"6px 10px",fontSize:13,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/>
              <button onClick={saveEdit} style={{background:"#1B4FD8",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
              <button onClick={()=>setEditing(false)} style={{background:"#F1F5F9",color:"#64748B",border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,cursor:"pointer"}}>✕</button>
            </div>
          ):(
            <p style={{fontSize:14,fontWeight:500,color:isListo?"#64748B":"#0F172A",lineHeight:1.45,wordBreak:"break-word",margin:0,textDecoration:isListo?"line-through":"none"}}>{item.text}</p>
          )}
          {item.note&&<p style={{fontSize:11,color:"#64748B",fontStyle:"italic",marginTop:3,fontWeight:300}}>{item.note}</p>}
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
            <p style={{fontSize:10,color:"#94A3B8",fontWeight:300,margin:0}}>{fmt(item.createdAt)}</p>
            {item.dueDate&&ds2&&<span onClick={()=>setShowDue(!showDue)} style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:6,background:ds2.bg,color:ds2.color,cursor:"pointer"}}>📅 {fmtDue(item.dueDate)} · {ds2.label}</span>}
          </div>
          {showDue&&(
            <div style={{display:"flex",gap:6,marginTop:6,alignItems:"center"}}>
              <input type="date" value={item.dueDate||""} onChange={e=>{upd({dueDate:e.target.value});setShowDue(false);}} style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"5px 8px",fontSize:12,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/>
              {item.dueDate&&<button onClick={()=>{upd({dueDate:null});setShowDue(false);}} style={{background:"#FEF2F2",color:"#EF4444",border:"none",borderRadius:8,padding:"5px 8px",fontSize:11,cursor:"pointer"}}>Quitar</button>}
              <button onClick={()=>setShowDue(false)} style={{background:"#F1F5F9",color:"#64748B",border:"none",borderRadius:8,padding:"5px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
            </div>
          )}
          {showPerson&&(
            <div style={{marginTop:6}}>
              <button onClick={()=>setShowP(!showP)} style={{background:item.person?"#EEF4FF":"#F8FAFF",border:item.person?"none":"1.5px dashed #CBD5E1",borderRadius:8,padding:"3px 10px",fontSize:11,color:item.person?"#1B4FD8":"#94A3B8",fontWeight:600,cursor:"pointer"}}>
                👤 {item.person||"Asignar persona"}
              </button>
            </div>
          )}
          {showPerson&&showP&&(
            <div style={{marginTop:8}}>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                <button onClick={()=>setPerson(null)} style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>— Ninguna</button>
                {persons.map(p=>(<button key={p} onClick={()=>setPerson(p)} style={{background:item.person===p?"#1B4FD8":"#F1F5F9",color:item.person===p?"#fff":"#475569",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>{p}</button>))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <input value={customP} onChange={e=>setCustomP(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&customP.trim())setPerson(customP.trim());}} placeholder="Otra persona..." style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"5px 10px",fontSize:12,fontFamily:"inherit",outline:"none",color:"#0F172A"}}/>
                <button onClick={()=>{if(customP.trim())setPerson(customP.trim());}} style={{background:"#1B4FD8",color:"#fff",border:"none",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer"}}>OK</button>
              </div>
            </div>
          )}
        </div>
      </div>
      <div style={{display:"flex",borderTop:"1px solid rgba(0,0,0,0.04)",background:"rgba(248,250,255,0.9)"}}>
        <button onClick={cycleStatus} style={{flex:1,border:"none",background:"none",padding:"9px 0",fontSize:11,fontWeight:700,cursor:"pointer",color:scfg.color,borderRight:"1px solid rgba(0,0,0,0.04)"}}>● {scfg.label}</button>
        {!item.dueDate&&<button onClick={()=>setShowDue(true)} style={{border:"none",background:"none",padding:"9px 10px",fontSize:11,cursor:"pointer",color:"#64748B",borderRight:"1px solid rgba(0,0,0,0.04)"}}>📅</button>}
        <button onClick={()=>{setEditing(true);setEditTxt(item.text);}} style={{border:"none",background:"none",padding:"9px 10px",fontSize:11,cursor:"pointer",color:"#64748B",borderRight:"1px solid rgba(0,0,0,0.04)"}}>✏️</button>
        <button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{border:"none",background:"none",padding:"9px 14px",fontSize:11,fontWeight:700,cursor:"pointer",color:isListo?"#16A34A":"#EF4444"}}>{isListo?"✓ Borrar":"✕"}</button>
      </div>
    </div>
  );
}

// ⚡ BASURERO
// ═══════════════════════════════════════════════════════════════
function Basurero({onMoved,onBackup}){
  const [items,setItems]=useState(()=>load(SK_TASKS));
  const [text,setText]=useState("");const [note,setNote]=useState("");const [cat,setCat]=useState("sin");
  const [showNote,setShowNote]=useState(false);const [flash,setFlash]=useState(null);
  const inputRef=useRef(null);
  useEffect(()=>save(SK_TASKS,items),[items]);
  const add=()=>{
    if(!text.trim())return;
    const item={id:Date.now().toString(),text:text.trim(),note:note.trim(),cat,createdAt:new Date().toISOString()};
    setItems(p=>[item,...p]);setFlash(item.id);setTimeout(()=>setFlash(null),500);
    setText("");setNote("");setCat("sin");setShowNote(false);inputRef.current?.focus();
  };
  const moveToList=(item)=>{
    const newItems=items.filter(i=>i.id!==item.id);
    setItems(newItems);save(SK_TASKS,newItems);
    const destKey=item.cat==="laboral"?SK_LABORAL:SK_PERSONAL;
    const existing=load(destKey);
    if(!existing.some(e=>e.id===item.id)){
      const newItem={id:item.id,text:item.text,note:item.note,cat:item.cat==="sin"?"personal":item.cat,createdAt:item.createdAt,status:"pendiente",person:null,dueDate:null};
      save(destKey,[...existing,newItem]);
    }
    onMoved(item.cat==="laboral"?"laboral":"personal");
  };
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{background:"linear-gradient(135deg,#1B4FD8,#2563EB)",padding:"24px 20px 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:22}}>⚡</span><span style={{color:"#fff",fontSize:22,fontWeight:700,letterSpacing:"-0.5px"}}>Basurero</span></div>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,fontWeight:300,marginBottom:12}}>Captura rápida · sin pensar</p>
            <div style={{background:"rgba(255,255,255,0.14)",borderRadius:10,padding:"5px 14px",display:"inline-block"}}><span style={{color:"#fff",fontSize:12,fontWeight:500}}>{items.length} pendiente{items.length!==1?"s":""}</span></div>
          </div>
          <HdrBtn onClick={onBackup} label="💾 Backup"/>
        </div>
      </div>
      <div style={{padding:"0 16px",marginTop:-18,position:"relative",zIndex:10}}>
        <div style={{background:"#fff",borderRadius:18,boxShadow:"0 8px 32px rgba(27,79,216,0.12)",border:"1.5px solid rgba(27,79,216,0.07)",overflow:"hidden"}}>

// HÁBITOS ENGINE — reutilizable para Hábitos y Conectar
// ═══════════════════════════════════════════════════════════════
function HabitEngine({title,icon,color1,color2,storageKey,logsKey,initial,onBackup}){
  const [habits,setHabits]=useState(()=>{const s=load(storageKey);return s.length>0?s:initial;});
  const [logs,setLogs]=useState(()=>loadObj(logsKey));
  const [view,setView]=useState("today");const [offset,setOffset]=useState(0);
  const [showForm,setShowForm]=useState(false);const [editH,setEditH]=useState(null);
  const [nName,setNName]=useState("");const [nType,setNType]=useState("simple");const [nDays,setNDays]=useState([0,1,2,3,4,5,6]);
  useEffect(()=>save(storageKey,habits),[habits]);
  useEffect(()=>{try{localStorage.setItem(logsKey,JSON.stringify(logs));}catch{}},[logs]);
  const sd=()=>{const d=new Date();d.setDate(d.getDate()+offset);return d;};
  const sel=sd();const selDow=sel.getDay();const selKey=dStr(sel);const isToday=offset===0;
  const selLbl=()=>{if(offset===0)return"Hoy";if(offset===-1)return"Ayer";return`${DAYS_FULL[selDow]} ${sel.getDate()} ${MONTHS_FULL[sel.getMonth()+1].slice(0,3)}`;};
  const lk=(hid,slot=null)=>slot?`${selKey}_${hid}_${slot}`:`${selKey}_${hid}`;
  const cycleLog=(hid,slot=null)=>{const k=lk(hid,slot);setLogs(p=>{const cur=p[k];const next=cur==null?"done":cur==="done"?"skip":null;const u={...p};if(next==null)delete u[k];else u[k]=next;return u;});};
  const streakH=(h)=>{let s=0;let d=new Date();d.setDate(d.getDate()-1);for(let i=0;i<90;i++){const dow=d.getDay();if(h.days.includes(dow)){if(h.type==="timed"){const aD=h.slots.every(sl=>logs[`${dStr(d)}_${h.id}_${sl}`]==="done");const aS=h.slots.some(sl=>logs[`${dStr(d)}_${h.id}_${sl}`]==="skip");if(aD)s++;else if(aS)break;}else{const v=logs[`${dStr(d)}_${h.id}`];if(v==="done")s++;else if(v==="skip")break;}}d.setDate(d.getDate()-1);}return s;};
  const pctH=(h)=>{const now=new Date();let done=0,total=0;for(let day=1;day<=now.getDate();day++){const d=new Date(now.getFullYear(),now.getMonth(),day);if(!h.days.includes(d.getDay()))continue;total++;if(h.type==="timed"){if(h.slots.every(s=>logs[`${dStr(d)}_${h.id}_${s}`]==="done"))done++;}else{if(logs[`${dStr(d)}_${h.id}`]==="done")done++;}}return total===0?null:Math.round((done/total)*100);};
  const openAdd=()=>{setEditH(null);setNName("");setNType("simple");setNDays([0,1,2,3,4,5,6]);setShowForm(true);};
  const openEdit=(h)=>{setEditH(h);setNName(h.name);setNType(h.type);setNDays([...h.days]);setShowForm(true);};
  const saveH=()=>{if(!nName.trim())return;if(editH){setHabits(p=>p.map(h=>h.id===editH.id?{...h,name:nName.trim(),type:nType,days:nDays,...(nType==="timed"&&!h.slots?{slots:["Mañana","Tarde","Noche"]}:{})}:h));}else{setHabits(p=>[...p,{id:Date.now().toString(),name:nName.trim(),type:nType,days:nDays,...(nType==="timed"?{slots:["Mañana","Tarde","Noche"]}:{})}]);}setShowForm(false);setEditH(null);};
  const habitsForDay=habits.filter(h=>h.days.includes(selDow));
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{background:`linear-gradient(135deg,${color1},${color2})`,padding:"24px 20px 36px",position:"relative",overflow:"hidden"}}>

                    </div>
                  ):(()=>{const val=logs[lk(habit.id)];return(<button onClick={()=>cycleLog(habit.id)} style={{width:"100%",border:"none",padding:"14px",background:val==="done"?"#F0FDF4":val==="skip"?"#FEF2F2":"#FAFAFA",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,borderTop:"1px solid rgba(0,0,0,0.05)"}}><span style={{fontSize:26}}>{val==="done"?"✅":val==="skip"?"❌":"⬜"}</span><span style={{fontSize:13,fontWeight:600,color:val==="done"?"#16A34A":val==="skip"?"#DC2626":"#94A3B8"}}>{val==="done"?"¡Hecho!":val==="skip"?"No hecho":"Toca para marcar"}</span></button>);})()}

        <div style={{padding:"16px 16px 0"}}>

            <div key={habit.id} style={{background:"#fff",borderRadius:16,border:"1.5px solid rgba(0,0,0,0.06)",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",padding:"14px",marginBottom:12}}>

                {Array.from({length:fdow}).map((_,i)=><div key={`e${i}`}/>)}
                {Array.from({length:dim}).map((_,i)=>{const day=i+1;const d=new Date(year,month,day);const dow=d.getDay();const dss=dStr(d);const isApp=habit.days.includes(dow);const isFut=day>now.getDate();let st=null;if(isApp&&!isFut){if(habit.type==="timed"){const aD=habit.slots.every(s=>logs[`${dss}_${habit.id}_${s}`]==="done");const aS=habit.slots.some(s=>logs[`${dss}_${habit.id}_${s}`]==="skip");const aDo=habit.slots.some(s=>logs[`${dss}_${habit.id}_${s}`]==="done");if(aD)st="done";else if(aS&&aDo)st="partial";else if(aS)st="skip";}else{st=logs[`${dss}_${habit.id}`]||null;}}const isT=day===now.getDate();return(<div key={day} style={{aspectRatio:"1",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:600,background:!isApp?"transparent":isFut?"#F1F5F9":st==="done"?"#22C55E":st==="partial"?"#F59E0B":st==="skip"?"#EF4444":"#E2E8F0",color:!isApp?"transparent":isFut?"#94A3B8":st?"white":"#94A3B8",border:isT?`2px solid ${color1}`:"none"}}>{isApp?day:""}</div>);})}
              </div>
            </div>
          );})}
        </div>
      )}
    </div>
  );
}

// 🛒 COMPRAS
// ═══════════════════════════════════════════════════════════════
function Compras({onBackup}){
  const [items,setItems]=useState(()=>load(SK_COMPRAS));
  const [text,setText]=useState("");const inputRef=useRef(null);
  useEffect(()=>save(SK_COMPRAS,items),[items]);
  const add=()=>{if(!text.trim())return;setItems(p=>[{id:Date.now().toString(),text:text.trim(),done:false,dueDate:null},...p]);setText("");inputRef.current?.focus();};
  const pending=items.filter(i=>!i.done);const done=items.filter(i=>i.done);
  const Item=({item,idx,total,isDone})=>{
    const [editing,setEditing]=useState(false);const [et,setEt]=useState(item.text);const [showDue,setShowDue]=useState(false);
    const upd=(patch)=>setItems(p=>p.map(i=>i.id===item.id?{...i,...patch}:i));
    const ds2=dueSem(item.dueDate);
    return(
      <div style={{background:isDone?"#F0FDF4":"#fff",borderRadius:13,border:isDone?"1.5px solid #BBF7D0":"1.5px solid rgba(234,88,12,0.08)",boxShadow:"0 2px 6px rgba(0,0,0,0.04)",marginBottom:8,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 12px 10px"}}>
          {!isDone&&<MoveBtn idx={idx} total={total} onMove={(d)=>setItems(p=>moveArr(p,idx,d))}/>}
          <button onClick={()=>upd({done:!item.done})} style={{width:26,height:26,borderRadius:"50%",border:isDone?"2px solid #22C55E":"2px solid #EA580C",background:isDone?"#22C55E":"none",cursor:"pointer",flexShrink:0,fontSize:13,color:isDone?"#fff":"#EA580C",display:"flex",alignItems:"center",justifyContent:"center"}}>{isDone?"✓":"○"}</button>
          <div style={{flex:1,minWidth:0}}>
            {editing?(
              <div style={{display:"flex",gap:5}}><input value={et} onChange={e=>setEt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(et.trim())upd({text:et.trim()});setEditing(false);}}} autoFocus style={{flex:1,border:"1.5px solid #EA580C",borderRadius:8,padding:"5px 8px",fontSize:13,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/><button onClick={()=>{if(et.trim())upd({text:et.trim()});setEditing(false);}} style={{background:"#EA580C",color:"#fff",border:"none",borderRadius:8,padding:"5px 9px",fontSize:11,cursor:"pointer"}}>OK</button><button onClick={()=>setEditing(false)} style={{background:"#F1F5F9",color:"#64748B",border:"none",borderRadius:8,padding:"5px 7px",fontSize:11,cursor:"pointer"}}>✕</button></div>
            ):(
              <p style={{fontSize:15,fontWeight:isDone?400:500,color:isDone?"#64748B":"#0F172A",margin:0,textDecoration:isDone?"line-through":"none"}}>{item.text}</p>
            )}
            {item.dueDate&&ds2&&<span onClick={()=>setShowDue(!showDue)} style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:6,background:ds2.bg,color:ds2.color,display:"inline-block",marginTop:3,cursor:"pointer"}}>📅 {fmtDue(item.dueDate)} · {ds2.label}</span>}
            {showDue&&(<div style={{display:"flex",gap:5,marginTop:5,alignItems:"center"}}><input type="date" value={item.dueDate||""} onChange={e=>{upd({dueDate:e.target.value});setShowDue(false);}} style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:8,padding:"5px 8px",fontSize:12,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/>{item.dueDate&&<button onClick={()=>{upd({dueDate:null});setShowDue(false);}} style={{background:"#FEF2F2",color:"#EF4444",border:"none",borderRadius:8,padding:"5px 7px",fontSize:11,cursor:"pointer"}}>Quitar</button>}<button onClick={()=>setShowDue(false)} style={{background:"#F1F5F9",color:"#64748B",border:"none",borderRadius:8,padding:"5px 7px",fontSize:11,cursor:"pointer"}}>✕</button></div>)}
          </div>
          {!isDone&&(<div style={{display:"flex",gap:3,flexShrink:0}}>{!item.dueDate&&<button onClick={()=>setShowDue(!showDue)} style={{background:"#FFF7ED",border:"none",borderRadius:8,padding:"5px 7px",fontSize:12,cursor:"pointer"}}>📅</button>}<button onClick={()=>{setEditing(true);setEt(item.text);}} style={{background:"#F8FAFF",border:"none",borderRadius:8,padding:"5px 7px",fontSize:12,cursor:"pointer"}}>✏️</button><button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:14,padding:"4px"}}>✕</button></div>)}
          {isDone&&<button onClick={()=>setItems(p=>p.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:14,padding:"4px",flexShrink:0}}>✕</button>}
        </div>
      </div>
    );
  };
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{background:"linear-gradient(135deg,#EA580C,#F97316)",padding:"24px 20px 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative"}}>
          <div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:22}}>🛒</span><span style={{color:"#fff",fontSize:22,fontWeight:700}}>Compras</span></div><p style={{color:"rgba(255,255,255,0.65)",fontSize:12,fontWeight:300}}>{pending.length} por comprar{done.length>0?` · ${done.length} comprado${done.length!==1?"s":""}`:""}</p></div>
          <HdrBtn onClick={onBackup} label="💾 Backup"/>
        </div>
      </div>
      <div style={{padding:"0 16px",marginTop:-18,position:"relative",zIndex:10}}>
        <div style={{background:"#fff",borderRadius:16,boxShadow:"0 8px 32px rgba(234,88,12,0.12)",border:"1.5px solid rgba(234,88,12,0.08)",display:"flex",overflow:"hidden"}}>
          <input ref={inputRef} value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();add();}}} placeholder="¿Qué necesitas comprar?" style={{flex:1,border:"none",padding:"16px",fontSize:15,fontFamily:"inherit",color:"#0F172A",background:"transparent",outline:"none"}}/>
          <button onClick={add} disabled={!text.trim()} style={{background:text.trim()?"linear-gradient(135deg,#EA580C,#F97316)":"#F1F5F9",color:text.trim()?"#fff":"#CBD5E1",border:"none",padding:"0 20px",fontSize:22,cursor:text.trim()?"pointer":"not-allowed"}}>+</button>
        </div>
      </div>
      <div style={{padding:"16px 16px 0"}}>
        {items.length===0?(<div style={{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}}><div style={{fontSize:44,marginBottom:10}}>🛒</div><p style={{fontSize:15,fontWeight:500}}>Lista vacía</p></div>):(
          <>{pending.map((item,idx)=><Item key={item.id} item={item} idx={idx} total={pending.length} isDone={false}/>)}
          {done.length>0&&(<div style={{marginTop:8}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><p style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:1,margin:0}}>✅ Comprado ({done.length})</p><button onClick={()=>setItems(p=>p.filter(i=>!i.done))} style={{background:"none",border:"none",color:"#EF4444",fontSize:11,fontWeight:600,cursor:"pointer"}}>Limpiar</button></div>{done.map((item,idx)=><Item key={item.id} item={item} idx={idx} total={done.length} isDone={true}/>)}</div>)}</>
        )}
      </div>
    </div>
  );
}

// 📌 FECHAS
// ═══════════════════════════════════════════════════════════════
function Fechas({onBackup}){
  const [fechas,setFechas]=useState(()=>{const s=load(SK_FECHAS);return s.length>0?s:INITIAL_FECHAS;});
  const [showForm,setShowForm]=useState(false);const [editF,setEditF]=useState(null);
  const [tipo,setTipo]=useState("anual");const [name,setName]=useState("");const [emoji,setEmoji]=useState("");const [day,setDay]=useState("");const [month,setMonth]=useState("");const [date,setDate]=useState("");
  useEffect(()=>save(SK_FECHAS,fechas),[fechas]);
  const reset=()=>{setName("");setEmoji("");setDay("");setMonth("");setDate("");setTipo("anual");setEditF(null);};
  const openAdd=()=>{reset();setShowForm(true);};
  const openEdit=(f)=>{setEditF(f);setName(f.name);setEmoji(f.emoji||"");setTipo(f.type);setDay(f.day?String(f.day):"");setMonth(f.month?String(f.month):"");setDate(f.date||"");setShowForm(true);};
  const saveFecha=()=>{if(!name.trim())return;const item={id:editF?editF.id:Date.now().toString(),name:name.trim(),emoji:emoji.trim()||TIPO_CONFIG[tipo].icon,type:tipo,...(tipo==="anual"?{day:parseInt(day),month:parseInt(month)}:{}),...(tipo==="mensual"?{day:parseInt(day)}:{}),...(tipo==="unica"?{date}:{})};if(editF)setFechas(p=>p.map(f=>f.id===editF.id?item:f).sort((a,b)=>daysUntilFecha(a)-daysUntilFecha(b)));else setFechas(p=>[...p,item].sort((a,b)=>daysUntilFecha(a)-daysUntilFecha(b)));reset();setShowForm(false);};
  const del=(id)=>setFechas(p=>p.filter(f=>f.id!==id));
  const sorted=[...fechas].sort((a,b)=>daysUntilFecha(a)-daysUntilFecha(b));
  const isOK=name.trim()&&((tipo==="anual"&&day&&month)||(tipo==="mensual"&&day)||(tipo==="unica"&&date));
  const FCard=({f})=>{const du=daysUntilFecha(f);const cfg=TIPO_CONFIG[f.type];const isHoy=du===0;const isPast=du<0;return(<div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:isHoy?"linear-gradient(135deg,#FEF3C7,#FFF7ED)":isPast?"#F8FAFF":"#fff",borderRadius:14,border:isHoy?"1.5px solid #FCD34D":"1.5px solid rgba(0,0,0,0.06)",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",opacity:isPast?0.7:1,marginBottom:8}}><div style={{fontSize:24,flexShrink:0}}>{f.emoji||cfg.icon}</div><div style={{flex:1,minWidth:0}}><div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}><p style={{fontSize:14,fontWeight:600,color:isHoy?"#92400E":"#0F172A",margin:0}}>{f.name}</p><span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:6,background:cfg.bg,color:cfg.color}}>{cfg.icon} {cfg.label}</span></div><p style={{fontSize:11,color:isHoy?"#B45309":"#64748B",margin:0}}>{formatFechaLabel(f)}{isHoy?" · 🎉 ¡HOY!":isPast?` · hace ${Math.abs(du)}d`:` · en ${du}d`}</p></div><button onClick={()=>openEdit(f)} style={{background:"#F8FAFF",border:"none",borderRadius:8,padding:"5px 7px",fontSize:12,cursor:"pointer",color:"#64748B"}}>✏️</button><button onClick={()=>del(f.id)} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:14,padding:"4px"}}>✕</button></div>);};
  const Sec=({title,color,items})=>items.length===0?null:(<div style={{marginBottom:16}}><p style={{fontSize:11,fontWeight:700,color,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{title}</p>{items.map(f=><FCard key={f.id} f={f}/>)}</div>);
  const hoy=sorted.filter(f=>daysUntilFecha(f)===0);const prox7=sorted.filter(f=>{const d=daysUntilFecha(f);return d>0&&d<=7;});const prox30=sorted.filter(f=>{const d=daysUntilFecha(f);return d>7&&d<=30;});const resto=sorted.filter(f=>daysUntilFecha(f)>30);const pasadas=sorted.filter(f=>daysUntilFecha(f)<0);
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{background:"linear-gradient(135deg,#0F766E,#0D9488)",padding:"24px 20px 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative"}}>
          <div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:22}}>📌</span><span style={{color:"#fff",fontSize:22,fontWeight:700}}>Fechas</span></div><p style={{color:"rgba(255,255,255,0.6)",fontSize:12,fontWeight:300}}>{fechas.length} evento{fechas.length!==1?"s":""}</p></div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><HdrBtn onClick={onBackup} label="💾 Backup"/><HdrBtn onClick={openAdd} label="+ Nueva"/></div>
        </div>
      </div>
      {showForm&&(<div style={{margin:"0 16px",marginTop:-14,position:"relative",zIndex:20}}><div style={{background:"#fff",borderRadius:16,boxShadow:"0 8px 32px rgba(15,118,110,0.15)",border:"1.5px solid rgba(15,118,110,0.15)",padding:16}}>
        <p style={{fontSize:13,fontWeight:600,color:"#0F766E",marginBottom:12}}>{editF?"Editar fecha":"Nueva fecha"}</p>
        <div style={{display:"flex",gap:8,marginBottom:10}}><input value={emoji} onChange={e=>setEmoji(e.target.value)} placeholder="😀" maxLength={2} style={{width:48,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px",fontSize:20,textAlign:"center",color:"#0F172A",outline:"none"}}/><input value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre del evento" style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/></div>
        <div style={{display:"flex",gap:6,marginBottom:12}}>{Object.entries(TIPO_CONFIG).map(([k,v])=>(<button key={k} onClick={()=>setTipo(k)} style={{flex:1,border:"none",borderRadius:10,padding:"8px 4px",fontSize:11,fontWeight:600,cursor:"pointer",background:tipo===k?v.bg:"#F8FAFF",color:tipo===k?v.color:"#94A3B8",outline:tipo===k?`2px solid ${v.color}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><span style={{fontSize:16}}>{v.icon}</span><span>{v.label}</span></button>))}</div>
        {tipo==="anual"&&(<div style={{display:"flex",gap:10,marginBottom:12}}><input value={day} onChange={e=>setDay(e.target.value)} placeholder="Día" type="number" min="1" max="31" style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/><select value={month} onChange={e=>setMonth(e.target.value)} style={{flex:2,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:month?"#0F172A":"#94A3B8",outline:"none",background:"#fff"}}><option value="">Mes</option>{MONTHS_FULL.slice(1).map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}</select></div>)}
        {tipo==="mensual"&&(<input value={day} onChange={e=>setDay(e.target.value)} placeholder="Día del mes" type="number" min="1" max="31" style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#0F172A",outline:"none",boxSizing:"border-box",marginBottom:12}}/>)}
        {tipo==="unica"&&(<input value={date} onChange={e=>setDate(e.target.value)} type="date" style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#0F172A",outline:"none",boxSizing:"border-box",marginBottom:12}}/>)}
        <p style={{fontSize:11,color:"#94A3B8",marginBottom:12,fontStyle:"italic"}}>{TIPO_CONFIG[tipo].desc}</p>
        <div style={{display:"flex",gap:10}}><button onClick={()=>{setShowForm(false);reset();}} style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer",background:"#fff",color:"#64748B"}}>Cancelar</button><button onClick={saveFecha} disabled={!isOK} style={{flex:2,border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:isOK?"pointer":"not-allowed",background:isOK?"linear-gradient(135deg,#0F766E,#0D9488)":"#E2E8F0",color:isOK?"#fff":"#94A3B8"}}>Guardar</button></div>
      </div></div>)}
      <div style={{padding:`${showForm?"16px":"0"} 16px 0`,marginTop:showForm?0:-18}}>
        {fechas.length===0?(<div style={{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}}><div style={{fontSize:44,marginBottom:10}}>📌</div><p style={{fontSize:15,fontWeight:500}}>Sin fechas guardadas</p></div>):(<><Sec title="🎉 Hoy" color="#B45309" items={hoy}/><Sec title="📅 Próximos 7 días" color="#16A34A" items={prox7}/><Sec title="🗓️ Este mes" color="#1B4FD8" items={prox30}/><Sec title="📋 Más adelante" color="#64748B" items={resto}/><Sec title="✓ Ya pasaron" color="#94A3B8" items={pasadas}/></>)}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// 🎂 CUMPLEAÑOS
// ═══════════════════════════════════════════════════════════════
function Cumpleanos({onBackup}){
  const [bdays,setBdays]=useState(()=>{const s=load(SK_BDAYS);return s.length>0?s:INITIAL_BDAYS;});
  const [showForm,setShowForm]=useState(false);const [editB,setEditB]=useState(null);
  const [nName,setNName]=useState("");const [nDay,setNDay]=useState("");const [nMonth,setNMonth]=useState("");
  useEffect(()=>save(SK_BDAYS,bdays),[bdays]);
  const openAdd=()=>{setEditB(null);setNName("");setNDay("");setNMonth("");setShowForm(true);};
  const openEdit=(b)=>{setEditB(b);setNName(b.name);setNDay(String(b.day));setNMonth(String(b.month));setShowForm(true);};
  const saveB=()=>{if(!nName.trim()||!nDay||!nMonth)return;const item={id:editB?editB.id:Date.now().toString(),name:nName.trim(),day:parseInt(nDay),month:parseInt(nMonth)};if(editB)setBdays(p=>p.map(b=>b.id===editB.id?item:b).sort((a,b)=>daysUntilBday(a.day,a.month)-daysUntilBday(b.day,b.month)));else setBdays(p=>[...p,item].sort((a,b)=>daysUntilBday(a.day,a.month)-daysUntilBday(b.day,b.month)));setNName("");setNDay("");setNMonth("");setShowForm(false);setEditB(null);};
  const del=(id)=>setBdays(p=>p.filter(b=>b.id!==id));
  const sorted=[...bdays].sort((a,b)=>daysUntilBday(a.day,a.month)-daysUntilBday(b.day,b.month));
  const todayB=sorted.filter(b=>isSameDay(b.day,b.month));const soon=sorted.filter(b=>{const d=daysUntilBday(b.day,b.month);return d>0&&d<=7;});const rest=sorted.filter(b=>daysUntilBday(b.day,b.month)>7);
  const BCard=({b})=>{const du=daysUntilBday(b.day,b.month);const td=isSameDay(b.day,b.month);return(<div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:td?"linear-gradient(135deg,#FEF3C7,#FFF7ED)":du<=7?"#F0FDF4":"#fff",borderRadius:13,border:td?"1.5px solid #FCD34D":du<=7?"1.5px solid #BBF7D0":"1.5px solid rgba(0,0,0,0.06)",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",marginBottom:8}}><div style={{fontSize:td?28:20}}>{td?"🎂":"🎈"}</div><div style={{flex:1,minWidth:0}}><p style={{fontSize:14,fontWeight:600,color:td?"#92400E":"#0F172A",margin:0}}>{b.name}</p><p style={{fontSize:12,color:td?"#B45309":"#64748B",margin:"2px 0 0"}}>{b.day} de {MONTHS_FULL[b.month]}{td?" · 🎉 ¡HOY!":`· en ${du}d`}</p></div><button onClick={()=>openEdit(b)} style={{background:"#F8FAFF",border:"none",borderRadius:8,padding:"5px 7px",fontSize:12,cursor:"pointer",color:"#64748B"}}>✏️</button><button onClick={()=>del(b.id)} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:14,padding:"4px"}}>✕</button></div>);};
  return(
    <div style={{padding:"0 0 20px"}}>
      <div style={{background:"linear-gradient(135deg,#7C3AED,#6D28D9)",padding:"24px 20px 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",position:"relative"}}>
          <div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:22}}>🎂</span><span style={{color:"#fff",fontSize:22,fontWeight:700}}>Cumpleaños</span></div><p style={{color:"rgba(255,255,255,0.6)",fontSize:12,fontWeight:300}}>{bdays.length} personas</p></div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><HdrBtn onClick={onBackup} label="💾 Backup"/><HdrBtn onClick={openAdd} label="+ Nuevo"/></div>
        </div>
      </div>
      {showForm&&(<div style={{margin:"0 16px",marginTop:-14,position:"relative",zIndex:20}}><div style={{background:"#fff",borderRadius:16,boxShadow:"0 8px 32px rgba(124,58,237,0.15)",border:"1.5px solid rgba(124,58,237,0.12)",padding:16}}>
        <p style={{fontSize:13,fontWeight:600,color:"#7C3AED",marginBottom:12}}>{editB?"Editar cumpleaños":"Agregar cumpleaños"}</p>
        <input value={nName} onChange={e=>setNName(e.target.value)} placeholder="Nombre" style={{width:"100%",border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",marginBottom:10,boxSizing:"border-box",color:"#0F172A",outline:"none"}}/>
        <div style={{display:"flex",gap:10,marginBottom:12}}><input value={nDay} onChange={e=>setNDay(e.target.value)} placeholder="Día" type="number" min="1" max="31" style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:"#0F172A",outline:"none"}}/><select value={nMonth} onChange={e=>setNMonth(e.target.value)} style={{flex:2,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px 12px",fontSize:14,fontFamily:"inherit",color:nMonth?"#0F172A":"#94A3B8",outline:"none",background:"#fff"}}><option value="">Mes</option>{MONTHS_FULL.slice(1).map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}</select></div>
        <div style={{display:"flex",gap:10}}><button onClick={()=>{setShowForm(false);setEditB(null);}} style={{flex:1,border:"1.5px solid #E2E8F0",borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer",background:"#fff",color:"#64748B"}}>Cancelar</button><button onClick={saveB} disabled={!nName.trim()||!nDay||!nMonth} style={{flex:2,border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer",background:nName.trim()&&nDay&&nMonth?"linear-gradient(135deg,#7C3AED,#6D28D9)":"#E2E8F0",color:nName.trim()&&nDay&&nMonth?"#fff":"#94A3B8"}}>Guardar</button></div>
      </div></div>)}
      <div style={{padding:`${showForm?"16px":"0"} 16px 0`,marginTop:showForm?0:-18}}>
        {todayB.length>0&&<div style={{marginBottom:20,marginTop:showForm?0:18}}><p style={{fontSize:11,fontWeight:700,color:"#B45309",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>🎉 Hoy</p>{todayB.map(b=><BCard key={b.id} b={b}/>)}</div>}
        {soon.length>0&&<div style={{marginBottom:20,marginTop:!showForm&&todayB.length===0?18:0}}><p style={{fontSize:11,fontWeight:700,color:"#16A34A",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📅 Próximos 7 días</p>{soon.map(b=><BCard key={b.id} b={b}/>)}</div>}
        {rest.length>0&&<div style={{marginTop:!showForm&&todayB.length===0&&soon.length===0?18:0}}><p style={{fontSize:11,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📋 Próximos</p>{rest.map(b=><BCard key={b.id} b={b}/>)}</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP PRINCIPAL — Tab bar con Más drawer
// ═══════════════════════════════════════════════════════════════
function App(){
  const [tab,setTab]=useState("basurero");
  const [showMas,setShowMas]=useState(false);
  const [showBanner,setShowBanner]=useState(()=>needsBackup());
  const [showRestore,setShowRestore]=useState(false);
  const fileRef=useRef(null);
  const handleBackup=()=>{doBackup();setShowBanner(false);};
  const handleRestore=(e)=>{const file=e.target.files[0];if(!file)return;doRestore(file,()=>{alert("✅ Backup cargado. Recargando...");window.location.reload();});};

  const MAIN_TABS=[
    {id:"basurero",icon:"⚡",label:"Basurero"},
    {id:"laboral",icon:"🔵",label:"Laboral"},
    {id:"personal",icon:"🟣",label:"Personal"},
    {id:"habitos",icon:"🏋️",label:"Hábitos"},
  ];
  const MAS_TABS=[
    {id:"conectar",icon:"🤝",label:"Conectar"},
    {id:"notas",icon:"📝",label:"Notas"},
    {id:"compras",icon:"🛒",label:"Compras"},
    {id:"fechas",icon:"📌",label:"Fechas"},
    {id:"cumpleanos",icon:"🎂",label:"Cumpleaños"},
  ];

  const activeInMas=MAS_TABS.some(t=>t.id===tab);

  const goTo=(id)=>{setTab(id);setShowMas(false);};

  const renderTab=()=>{
    switch(tab){
      case"basurero": return <Basurero onMoved={(d)=>setTab(d)} onBackup={handleBackup}/>;
      case"laboral":  return <Laboral onBackup={handleBackup}/>;
      case"personal": return <Personal onBackup={handleBackup}/>;
      case"habitos":  return <HabitEngine title="Hábitos" icon="🏋️" color1="#059669" color2="#10B981" storageKey={SK_HABITS} logsKey={SK_LOGS} initial={INITIAL_HABITS} onBackup={handleBackup}/>;
      case"conectar": return <HabitEngine title="Conectar" icon="🤝" color1="#DB2777" color2="#EC4899" storageKey={SK_CONECTAR} logsKey={SK_CLOGS} initial={INITIAL_CONECTAR} onBackup={handleBackup}/>;
      case"notas":    return <Notas onBackup={handleBackup}/>;
      case"compras":  return <Compras onBackup={handleBackup}/>;
      case"fechas":   return <Fechas onBackup={handleBackup}/>;
      case"cumpleanos": return <Cumpleanos onBackup={handleBackup}/>;
      default: return null;
    }
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#EEF4FF,#F8FAFF,#E8F0FF)",fontFamily:"'Sora',sans-serif"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');*{box-sizing:border-box;margin:0;padding:0;}textarea,input,select{font-family:'Sora',sans-serif;}button:active{opacity:0.8;}`}</style>

      {/* BACKUP BANNER */}
      {showBanner&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:200,background:"linear-gradient(135deg,#1B4FD8,#2563EB)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 4px 20px rgba(27,79,216,0.3)"}}>
          <span style={{fontSize:18}}>💾</span>
          <div style={{flex:1}}><p style={{color:"#fff",fontSize:12,fontWeight:600,margin:0}}>Backup pendiente</p><p style={{color:"rgba(255,255,255,0.7)",fontSize:10,margin:0}}>Último: {lastBackupLabel()}</p></div>
          <button onClick={()=>setShowRestore(!showRestore)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"5px 10px",color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>Restaurar</button>
          <button onClick={handleBackup} style={{background:"white",border:"none",borderRadius:8,padding:"5px 12px",color:"#1B4FD8",fontSize:11,fontWeight:700,cursor:"pointer"}}>💾 Guardar</button>
          <button onClick={()=>setShowBanner(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.6)",fontSize:18,cursor:"pointer",padding:"2px 6px"}}>✕</button>
        </div>
      )}
      {showRestore&&(
        <div style={{position:"fixed",top:showBanner?56:0,left:0,right:0,zIndex:190,background:"#fff",padding:"16px",boxShadow:"0 4px 20px rgba(0,0,0,0.12)",borderBottom:"1.5px solid #E2E8F0"}}>
          <p style={{fontSize:13,fontWeight:600,color:"#0F172A",marginBottom:8}}>Cargar backup</p>
          <input ref={fileRef} type="file" accept=".json" onChange={handleRestore} style={{display:"none"}}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>fileRef.current?.click()} style={{flex:1,background:"linear-gradient(135deg,#1B4FD8,#2563EB)",color:"#fff",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer"}}>📂 Seleccionar archivo</button>
            <button onClick={()=>setShowRestore(false)} style={{border:"1.5px solid #E2E8F0",background:"#fff",color:"#64748B",borderRadius:10,padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      )}

      {/* MÁS DRAWER */}
      {showMas&&(
        <>
          <div onClick={()=>setShowMas(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:290}}/>
          <div style={{position:"fixed",bottom:62,left:0,right:0,zIndex:295,background:"#fff",borderRadius:"20px 20px 0 0",padding:"16px 16px 8px",boxShadow:"0 -8px 32px rgba(0,0,0,0.15)"}}>
            <div style={{width:36,height:4,borderRadius:2,background:"#E2E8F0",margin:"0 auto 16px"}}/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
              {MAS_TABS.map(t=>(
                <button key={t.id} onClick={()=>goTo(t.id)} style={{border:"none",background:tab===t.id?"#EEF4FF":"#F8FAFF",borderRadius:14,padding:"12px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,outline:tab===t.id?"2px solid #1B4FD8":"none"}}>
                  <span style={{fontSize:22}}>{t.icon}</span>
                  <span style={{fontSize:9,fontWeight:600,color:tab===t.id?"#1B4FD8":"#64748B"}}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>
        </>
      )}

      {/* CONTENIDO */}
      <div style={{position:"fixed",top:showBanner?(showRestore?120:56):0,left:0,right:0,bottom:62,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        {renderTab()}
      </div>

      {/* TAB BAR */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,height:62,background:"rgba(255,255,255,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(27,79,216,0.1)",display:"flex",alignItems:"center",boxShadow:"0 -2px 16px rgba(0,0,0,0.07)",zIndex:300}}>
        {MAIN_TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setShowMas(false);}} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 0",height:"100%",justifyContent:"center"}}>
            <span style={{fontSize:18,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:8,fontWeight:700,color:tab===t.id?"#1B4FD8":"#94A3B8"}}>{t.label}</span>
            {tab===t.id&&<div style={{width:18,height:2,borderRadius:2,background:"#1B4FD8"}}/>}
          </button>
        ))}
        {/* Botón MÁS */}
        <button onClick={()=>setShowMas(!showMas)} style={{flex:1,border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 0",height:"100%",justifyContent:"center"}}>
          <span style={{fontSize:18,lineHeight:1}}>···</span>
          <span style={{fontSize:8,fontWeight:700,color:activeInMas||showMas?"#1B4FD8":"#94A3B8"}}>Más</span>
          {(activeInMas||showMas)&&<div style={{width:18,height:2,borderRadius:2,background:"#1B4FD8"}}/>}
        </button>
      </div>
    </div>
  );
}

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
